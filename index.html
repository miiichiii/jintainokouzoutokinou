<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人体の構造と機能 確認テスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f6f8ff;
      --ink: #19212e;
      --muted: #5d6678;
      --card: rgba(255, 255, 255, 0.58);
      --card-strong: rgba(255, 255, 255, 0.78);
      --line: rgba(84, 104, 142, 0.15);
      --accent: #2c7be5;
      --accent-strong: #1c5ecf;
      --mint: #9ce8df;
      --pink: #ffc9df;
      --lavender: #d7d9ff;
      --locked: rgba(216, 220, 231, 0.72);
      --shadow: 0 26px 70px rgba(73, 92, 132, 0.16);
      --hero-shadow: 0 30px 90px rgba(74, 96, 160, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "M PLUS 1p", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(168, 237, 234, 0.96), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(254, 214, 227, 0.92), transparent 24%),
        radial-gradient(circle at 72% 78%, rgba(215, 217, 255, 0.88), transparent 22%),
        linear-gradient(155deg, #f7fbff, #eef2ff 54%, #fdf7fb);
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.32) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.32) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
      opacity: 0.38;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.4), transparent 54%);
      opacity: 0.55;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.8fr);
      gap: 26px;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 36px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.32)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.34), rgba(254, 214, 227, 0.26) 56%, rgba(176, 209, 255, 0.22));
      box-shadow: var(--hero-shadow);
      backdrop-filter: blur(18px);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(4px);
    }

    .hero::before {
      inset: -78px auto auto -86px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(156, 232, 223, 0.64), transparent 64%);
    }

    .hero::after {
      inset: auto -72px -72px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(44, 123, 229, 0.2), transparent 68%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: #19407f;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: inset 0 0 0 1px rgba(76, 114, 201, 0.08);
    }

    h1 {
      margin: 18px 0 12px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: clamp(2.3rem, 5vw, 4.35rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .hero-lead {
      margin: 0;
      max-width: 720px;
      font-size: 1.02rem;
      line-height: 1.9;
      color: var(--muted);
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(90, 114, 159, 0.1);
      color: #314053;
      font-size: 0.88rem;
      box-shadow: 0 12px 24px rgba(102, 119, 159, 0.08);
    }

    .hero-chip strong {
      font-weight: 800;
      color: #173665;
    }

    .hero-aside {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .hero-orbital {
      position: relative;
      min-height: 260px;
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.4), rgba(254, 214, 227, 0.26));
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: 0 18px 44px rgba(81, 104, 150, 0.16);
      overflow: hidden;
    }

    .hero-orbital::before,
    .hero-orbital::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      inset: auto;
    }

    .hero-orbital::before {
      width: 190px;
      height: 190px;
      top: 28px;
      right: 8px;
      border: 1px solid rgba(44, 123, 229, 0.18);
    }

    .hero-orbital::after {
      width: 112px;
      height: 112px;
      right: 52px;
      bottom: 22px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.86), rgba(156, 232, 223, 0.38));
      box-shadow: 0 16px 34px rgba(65, 93, 147, 0.16);
    }

    .orbital-label {
      color: #5a6d85;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .orbital-value {
      margin-top: 14px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: clamp(3.4rem, 7vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .orbital-caption {
      margin-top: 12px;
      max-width: 14em;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .hero-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-stat {
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(88, 106, 150, 0.1);
      box-shadow: 0 12px 28px rgba(84, 101, 140, 0.08);
    }

    .mini-stat-label {
      font-size: 0.82rem;
      color: #657389;
    }

    .mini-stat-value {
      margin-top: 8px;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #173665;
    }

    .panel {
      margin-top: 28px;
      padding: 24px 24px 20px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.46)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.18), rgba(255, 201, 223, 0.16));
      box-shadow: 0 18px 36px rgba(82, 98, 134, 0.08);
      backdrop-filter: blur(14px);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      font-family: "Noto Sans JP", sans-serif;
    }

    .welcome-name {
      margin-top: 12px;
      color: #143f82;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .panel-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
    }

    .panel-list li {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(84, 104, 142, 0.1);
      color: #324155;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 32px 0 16px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.46rem;
      font-family: "Noto Sans JP", sans-serif;
    }

    .section-title span {
      color: #516078;
      font-size: 0.88rem;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(87, 108, 153, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 260px;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.5)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.2), rgba(215, 217, 255, 0.1));
      box-shadow: 0 18px 34px rgba(78, 94, 130, 0.1);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #2c7be5, #8fe4d9, #ffc9df);
      opacity: 0.85;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -54px;
      top: -54px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent 66%);
      pointer-events: none;
    }

    .card.available:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 44px rgba(56, 78, 120, 0.17);
      border-color: rgba(44, 123, 229, 0.26);
    }

    .card.locked {
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.4)),
        linear-gradient(135deg, rgba(232, 236, 244, 0.46), rgba(245, 246, 250, 0.22));
      border-style: dashed;
    }

    .badge-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .badge.live {
      background: rgba(156, 232, 223, 0.56);
      color: #115e59;
    }

    .badge.lock {
      background: rgba(229, 231, 235, 0.82);
      color: #6b7280;
    }

    .lesson-phase {
      font-size: 0.82rem;
      font-weight: 700;
      color: #5a6b82;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lesson-no {
      margin-top: 18px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .lesson-title {
      margin-top: 10px;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .card-footer {
      margin-top: auto;
      padding-top: 20px;
    }

    .button,
    .button-muted {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .button {
      color: white;
      background: linear-gradient(135deg, #2c7be5, #47b8ff 50%, #74dfd0);
      box-shadow: 0 14px 24px rgba(68, 126, 214, 0.24);
    }

    .button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #1b5ccb, #2c7be5 55%, #5ad2c2);
    }

    .button-muted {
      color: #6b7280;
      background: var(--locked);
      cursor: default;
    }

    .empty {
      padding: 28px 22px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px dashed rgba(91, 100, 114, 0.28);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-mini-grid,
      .panel-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding: 20px 0 40px;
      }

      .hero,
      .panel {
        padding: 20px;
        border-radius: 20px;
      }

      .card {
        min-height: 230px;
        padding: 20px;
        border-radius: 22px;
      }

      .section-title {
        display: block;
      }

      .section-title span {
        display: block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Human Anatomy Quiz</div>
        <h1>人体の構造と機能<br>確認テスト</h1>
      </div>
    </section>

    <section id="welcome-panel" class="panel" style="display: none;">
      <div id="welcome-name" class="welcome-name" style="display: none;"></div>
    </section>

    <div class="section-title">
      <h2>公開中のテスト</h2>
      <span id="live-count"></span>
    </div>
    <section id="published-grid" class="grid"></section>

    <div class="section-title">
      <h2>準備中</h2>
      <span>公開までお待ちください。</span>
    </div>
    <section id="upcoming-grid" class="grid"></section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="quiz-auth-config.js"></script>
  <script>
    const lessons = [
      { no: 1, title: "解剖学の基礎", href: "1st-test.html", published: true },
      { no: 2, title: "心臓と循環の基礎", href: "2nd-test.html", published: false },
      { no: 3, title: "血管・循環と呼吸器", href: "3rd-test.html", published: false },
      { no: 4, title: "消化器", href: "4th-test.html", published: false },
      { no: 5, title: "感覚器", href: "5th-test.html", published: false },
      { no: 6, title: "神経系", href: "6th-test.html", published: false },
      { no: 7, title: "泌尿器・生殖器", href: "7th-test.html", published: false },

      // 例:
      // { no: 8, title: "次回の内容", href: "8th-test.html", published: false },
    ];

    const publishedGrid = document.getElementById("published-grid");
    const upcomingGrid = document.getElementById("upcoming-grid");
    const liveCount = document.getElementById("live-count");
    const welcomePanel = document.getElementById("welcome-panel");
    const welcomeName = document.getElementById("welcome-name");
    const liffId = String((window.QUIZ_RUNTIME_CONFIG || {}).liffId || "").trim();

    function createCard(lesson) {
      const article = document.createElement("article");
      article.className = `card ${lesson.published ? "available" : "locked"}`;

      const statusClass = lesson.published ? "live" : "lock";
      const statusText = lesson.published ? "公開中" : "準備中";
      const action = lesson.published
        ? `<a class="button" href="${buildLessonUrl(lesson.href)}">第${lesson.no}回を開く</a>`
        : `<div class="button-muted">公開までお待ちください</div>`;

      article.innerHTML = `
        <div class="badge-row">
          <span class="badge ${statusClass}">${statusText}</span>
          <span class="lesson-phase">Lesson ${String(lesson.no).padStart(2, "0")}</span>
        </div>
        <div class="lesson-no">確認テスト ${lesson.no}</div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="card-footer">${action}</div>
      `;

      return article;
    }

    function buildLessonUrl(path) {
      if (!liffId) {
        return path;
      }
      return `https://liff.line.me/${liffId}/${path}`;
    }

    async function initIndexLiff() {
      if (!liffId || !window.liff) {
        return;
      }

      try {
        await window.liff.init({
          liffId,
          withLoginOnExternalBrowser: true
        });

        if (window.liff.isLoggedIn()) {
          const profile = await window.liff.getProfile();
          if (profile && profile.displayName) {
            welcomePanel.style.display = "block";
            welcomeName.textContent = `${profile.displayName}さん、ようこそ`;
            welcomeName.style.display = "block";
          }
        }

        const params = new URLSearchParams(window.location.search);
        const state = params.get("liff.state");
        if (!state) {
          return;
        }

        const targetUrl = new URL(decodeURIComponent(state), window.location.href);
        const currentUrl = new URL(window.location.href);
        const sameTarget =
          targetUrl.pathname === currentUrl.pathname &&
          targetUrl.search === currentUrl.search &&
          targetUrl.hash === currentUrl.hash;

        if (!sameTarget) {
          window.location.replace(targetUrl.toString());
        }
      } catch (error) {
        console.error("LIFF init failed on index page:", error);
      }
    }

    const published = lessons.filter((lesson) => lesson.published);
    const upcoming = lessons.filter((lesson) => !lesson.published);

    liveCount.textContent = `${published.length}件公開中`;
    if (published.length === 0) {
      publishedGrid.innerHTML = '<div class="empty">現在公開中の確認テストはありません。</div>';
    } else {
      published.forEach((lesson) => publishedGrid.appendChild(createCard(lesson)));
    }

    if (upcoming.length === 0) {
      upcomingGrid.innerHTML = '<div class="empty">準備中のテストはありません。</div>';
    } else {
      upcoming.forEach((lesson) => upcomingGrid.appendChild(createCard(lesson)));
    }

    initIndexLiff();
  </script>
</body>
</html>
