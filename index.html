<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人体の構造と機能 確認テスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #f6f8ff;
      --ink: #19212e;
      --muted: #5d6678;
      --card: rgba(255, 255, 255, 0.58);
      --card-strong: rgba(255, 255, 255, 0.78);
      --line: rgba(84, 104, 142, 0.15);
      --accent: #2c7be5;
      --accent-strong: #1c5ecf;
      --mint: #9ce8df;
      --pink: #ffc9df;
      --lavender: #d7d9ff;
      --locked: rgba(216, 220, 231, 0.72);
      --shadow: 0 26px 70px rgba(73, 92, 132, 0.16);
      --hero-shadow: 0 30px 90px rgba(74, 96, 160, 0.2);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "M PLUS 1p", "Noto Sans JP", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(168, 237, 234, 0.96), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(254, 214, 227, 0.92), transparent 24%),
        radial-gradient(circle at 72% 78%, rgba(215, 217, 255, 0.88), transparent 22%),
        linear-gradient(155deg, #f7fbff, #eef2ff 54%, #fdf7fb);
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.32) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.32) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
      opacity: 0.38;
    }

    body::after {
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.4), transparent 54%);
      opacity: 0.55;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(260px, 0.8fr);
      gap: 26px;
      padding: 34px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 36px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.32)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.34), rgba(254, 214, 227, 0.26) 56%, rgba(176, 209, 255, 0.22));
      box-shadow: var(--hero-shadow);
      backdrop-filter: blur(18px);
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(4px);
    }

    .hero::before {
      inset: -78px auto auto -86px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(156, 232, 223, 0.64), transparent 64%);
    }

    .hero::after {
      inset: auto -72px -72px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(44, 123, 229, 0.2), transparent 68%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      color: #19407f;
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: inset 0 0 0 1px rgba(76, 114, 201, 0.08);
    }

    h1 {
      margin: 18px 0 12px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: clamp(2.3rem, 5vw, 4.35rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .lesson-icon {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
      min-height: 58px;
    }

    .lesson-icon canvas {
      display: block;
      width: 58px;
      height: 58px;
      image-rendering: pixelated;
      filter: drop-shadow(0 8px 14px rgba(67, 92, 145, 0.12));
    }

    .hero-lead {
      margin: 0;
      max-width: 720px;
      font-size: 1.02rem;
      line-height: 1.9;
      color: var(--muted);
    }

    .hero-points {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 15px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid rgba(90, 114, 159, 0.1);
      color: #314053;
      font-size: 0.88rem;
      box-shadow: 0 12px 24px rgba(102, 119, 159, 0.08);
    }

    .hero-chip strong {
      font-weight: 800;
      color: #173665;
    }

    .hero-aside {
      position: relative;
      z-index: 1;
      display: grid;
      align-content: space-between;
      gap: 18px;
    }

    .hero-orbital {
      position: relative;
      min-height: 260px;
      padding: 24px;
      border-radius: 30px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.34)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.4), rgba(254, 214, 227, 0.26));
      border: 1px solid rgba(255, 255, 255, 0.62);
      box-shadow: 0 18px 44px rgba(81, 104, 150, 0.16);
      overflow: hidden;
    }

    .hero-orbital::before,
    .hero-orbital::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      inset: auto;
    }

    .hero-orbital::before {
      width: 190px;
      height: 190px;
      top: 28px;
      right: 8px;
      border: 1px solid rgba(44, 123, 229, 0.18);
    }

    .hero-orbital::after {
      width: 112px;
      height: 112px;
      right: 52px;
      bottom: 22px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.86), rgba(156, 232, 223, 0.38));
      box-shadow: 0 16px 34px rgba(65, 93, 147, 0.16);
    }

    .orbital-label {
      color: #5a6d85;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .orbital-value {
      margin-top: 14px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: clamp(3.4rem, 7vw, 5rem);
      line-height: 0.95;
      letter-spacing: -0.08em;
    }

    .orbital-caption {
      margin-top: 12px;
      max-width: 14em;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .hero-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .mini-stat {
      padding: 16px 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(88, 106, 150, 0.1);
      box-shadow: 0 12px 28px rgba(84, 101, 140, 0.08);
    }

    .mini-stat-label {
      font-size: 0.82rem;
      color: #657389;
    }

    .mini-stat-value {
      margin-top: 8px;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #173665;
    }

    .panel {
      margin-top: 28px;
      padding: 24px 24px 20px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.46)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.18), rgba(255, 201, 223, 0.16));
      box-shadow: 0 18px 36px rgba(82, 98, 134, 0.08);
      backdrop-filter: blur(14px);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.18rem;
      font-family: "Noto Sans JP", sans-serif;
    }

    .welcome-name {
      margin-top: 2px;
      color: #143f82;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .welcome-badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(44, 123, 229, 0.1);
      color: #19407f;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 12px;
    }

    .welcome-message {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .welcome-cleared {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.68);
      border: 1px solid rgba(84, 104, 142, 0.1);
      color: #324155;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .welcome-cleared strong {
      color: #173665;
    }

    .welcome-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .welcome-stat {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(84, 104, 142, 0.1);
      box-shadow: 0 10px 24px rgba(84, 101, 140, 0.08);
    }

    .welcome-stat-label {
      font-size: 0.8rem;
      color: #66758d;
    }

    .welcome-stat-value {
      margin-top: 8px;
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #173665;
    }

    .welcome-chart {
      margin-top: 16px;
      padding: 18px 18px 14px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(84, 104, 142, 0.1);
      box-shadow: 0 10px 24px rgba(84, 101, 140, 0.08);
    }

    .welcome-chart-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #4a5b76;
      margin-bottom: 12px;
    }

    .welcome-chart svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .welcome-chart-empty {
      color: #6b7280;
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .panel-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.95rem;
    }

    .panel-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 0;
      padding: 0;
      list-style: none;
    }

    .panel-list li {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(84, 104, 142, 0.1);
      color: #324155;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 32px 0 16px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 1.46rem;
      font-family: "Noto Sans JP", sans-serif;
    }

    .section-title span {
      color: #516078;
      font-size: 0.88rem;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(87, 108, 153, 0.1);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 260px;
      padding: 24px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.5)),
        linear-gradient(135deg, rgba(168, 237, 234, 0.2), rgba(215, 217, 255, 0.1));
      box-shadow: 0 18px 34px rgba(78, 94, 130, 0.1);
      transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #2c7be5, #8fe4d9, #ffc9df);
      opacity: 0.85;
    }

    .card::after {
      content: "";
      position: absolute;
      right: -54px;
      top: -54px;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.8), transparent 66%);
      pointer-events: none;
    }

    .card.available:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 44px rgba(56, 78, 120, 0.17);
      border-color: rgba(44, 123, 229, 0.26);
    }

    .card.cleared {
      border-color: rgba(34, 197, 94, 0.28);
      box-shadow: 0 24px 42px rgba(57, 128, 91, 0.14);
    }

    .card.locked {
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.64), rgba(255, 255, 255, 0.4)),
        linear-gradient(135deg, rgba(232, 236, 244, 0.46), rgba(245, 246, 250, 0.22));
      border-style: dashed;
    }

    .badge-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .badge.live {
      background: rgba(156, 232, 223, 0.56);
      color: #115e59;
    }

    .badge.lock {
      background: rgba(229, 231, 235, 0.82);
      color: #6b7280;
    }

    .badge.cleared {
      background: rgba(220, 252, 231, 0.86);
      color: #15803d;
    }

    .lesson-phase {
      font-size: 0.82rem;
      font-weight: 700;
      color: #5a6b82;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .lesson-no {
      margin-top: 18px;
      font-family: "Noto Sans JP", sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
    }

    .lesson-title {
      margin-top: 10px;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .card-footer {
      margin-top: auto;
      padding-top: 20px;
    }

    .button,
    .button-muted {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .button {
      color: white;
      background: linear-gradient(135deg, #2c7be5, #47b8ff 50%, #74dfd0);
      box-shadow: 0 14px 24px rgba(68, 126, 214, 0.24);
    }

    .button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, #1b5ccb, #2c7be5 55%, #5ad2c2);
    }

    .button-muted {
      color: #6b7280;
      background: var(--locked);
      cursor: default;
    }

    .empty {
      padding: 28px 22px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px dashed rgba(91, 100, 114, 0.28);
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-mini-grid,
      .panel-list,
      .welcome-stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding: 20px 0 40px;
      }

      .hero,
      .panel {
        padding: 20px;
        border-radius: 20px;
      }

      .card {
        min-height: 230px;
        padding: 20px;
        border-radius: 22px;
      }

      .section-title {
        display: block;
      }

      .section-title span {
        display: block;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="eyebrow">Human Anatomy Quiz</div>
        <h1>人体の構造と機能<br>確認テスト</h1>
      </div>
    </section>

    <section id="welcome-panel" class="panel" style="display: none;">
      <div id="welcome-badge" class="welcome-badge" style="display: none;"></div>
      <div id="welcome-name" class="welcome-name" style="display: none;"></div>
      <div id="welcome-message" class="welcome-message" style="display: none;"></div>
      <div id="welcome-cleared-list" class="welcome-cleared" style="display: none;"></div>
      <div id="welcome-stats" class="welcome-stats" style="display: none;">
        <div class="welcome-stat">
          <div class="welcome-stat-label">通算挑戦</div>
          <div id="welcome-total-attempts" class="welcome-stat-value">0</div>
        </div>
        <div class="welcome-stat">
          <div class="welcome-stat-label">クリア済み</div>
          <div id="welcome-cleared-count" class="welcome-stat-value">0 / 0</div>
        </div>
        <div class="welcome-stat">
          <div class="welcome-stat-label">満点クリア</div>
          <div id="welcome-perfect" class="welcome-stat-value">0</div>
        </div>
        <div class="welcome-stat">
          <div class="welcome-stat-label">達成率</div>
          <div id="welcome-completion" class="welcome-stat-value">0%</div>
        </div>
      </div>
      <div id="welcome-chart" class="welcome-chart" style="display: none;"></div>
    </section>

    <div class="section-title">
      <h2>公開中のテスト</h2>
      <span id="live-count"></span>
    </div>
    <section id="published-grid" class="grid"></section>

    <div class="section-title">
      <h2>準備中</h2>
      <span>公開までお待ちください。</span>
    </div>
    <section id="upcoming-grid" class="grid"></section>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="quiz-auth-config.js"></script>
  <script>
    const lessons = [
      { no: 1, title: "解剖学の基礎", href: "1st-test.html", published: true, icon: "bone" },
      { no: 2, title: "心臓と循環の基礎", href: "2nd-test.html", published: true, icon: "heart" },
      { no: 3, title: "血管・循環と呼吸器", href: "3rd-test.html", published: false, publishAt: "2026-04-27T14:50:00+09:00", icon: "lungs" },
      { no: 4, title: "消化器", href: "4th-test.html", published: false, publishAt: "2026-04-27T16:30:00+09:00", icon: "stomach" },
      { no: 5, title: "感覚器", href: "5th-test.html", published: false, icon: "eye" },
      { no: 6, title: "神経系", href: "6th-test.html", published: false, icon: "brain" },
      { no: 7, title: "泌尿器・生殖器", href: "7th-test.html", published: false, icon: "kidneys" },

      // 例:
      // { no: 8, title: "次回の内容", href: "8th-test.html", published: false },
    ];

    const publishedGrid = document.getElementById("published-grid");
    const upcomingGrid = document.getElementById("upcoming-grid");
    const liveCount = document.getElementById("live-count");
    const welcomePanel = document.getElementById("welcome-panel");
    const welcomeBadge = document.getElementById("welcome-badge");
    const welcomeName = document.getElementById("welcome-name");
    const welcomeMessage = document.getElementById("welcome-message");
    const welcomeClearedList = document.getElementById("welcome-cleared-list");
    const welcomeStats = document.getElementById("welcome-stats");
    const welcomeTotalAttempts = document.getElementById("welcome-total-attempts");
    const welcomeCleared = document.getElementById("welcome-cleared-count");
    const welcomePerfect = document.getElementById("welcome-perfect");
    const welcomeCompletion = document.getElementById("welcome-completion");
    const welcomeChart = document.getElementById("welcome-chart");
    const apiBaseUrl = String((window.QUIZ_RUNTIME_CONFIG || {}).apiBaseUrl || "").replace(/\/$/, "");
    const quizSet = String((window.QUIZ_RUNTIME_CONFIG || {}).quizSet || "jintainokouzoutokinou").trim();
    const liffId = String((window.QUIZ_RUNTIME_CONFIG || {}).liffId || "").trim();
    let clearedQuizNumbers = new Set();

    const icons = {
      skull: [
        "00000000000011111111111111111111000000000000","00000000011111111111111111111111111000000000",
        "00000001111111111111111111111111111110000000","00000111111111111111111111111111111111100000",
        "00001111111111111111111111111111111111110000","00011111111111111111111111111111111111111000",
        "00111111111111111111111111111111111111111100","01111111111111111111111111111111111111111110",
        "01111111111111111111111111111111111111111110","11111111111111111111111111111111111111111111",
        "11111111111111111111111111111111111111111111","11111111111111111111111111111111111111111111",
        "11111111222222222111111112222222221111111111","11111122222222222221111222222222222211111111",
        "11111222222222222222112222222222222221111111","11112222222222222222222222222222222222111111",
        "11112222222222222222222222222222222222111111","11112222222222222222222222222222222222111111",
        "11112222222222222222222222222222222222111111","11111222222222222222112222222222222221111111",
        "11111122222222222221111222222222222211111111","11111111222222222111111112222222221111111111",
        "01111111111111111112222111111111111111111110","01111111111111111122222211111111111111111110",
        "00111111111111111111111111111111111111111100","00011111111111111111111111111111111111111000",

    function renderArrayToCanvas(canvas, mapStrArray) {
      if (!canvas || !mapStrArray || mapStrArray.length === 0) {
        return;
      }
      canvas.width = 88;
      canvas.height = 72;
      const ctx = canvas.getContext("2d");
      const rows = mapStrArray.length;
      const cols = mapStrArray[0].length;
      const pixelSize = canvas.width / cols;
      const heightOffset = (canvas.height - (rows * pixelSize)) / 2;
      const colorMain = "#19407f";
      const colorSub = "rgba(255, 255, 255, 0.92)";

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < rows; y += 1) {
        for (let x = 0; x < cols; x += 1) {
          const dot = mapStrArray[y][x];
          if (dot === "0") {
            continue;
          }
          ctx.fillStyle = dot === "1" ? colorMain : colorSub;
          ctx.fillRect(x * pixelSize, heightOffset + y * pixelSize, pixelSize + 0.5, pixelSize + 0.5);
        }
      }
    }

    function renderVisibleIcons() {
      document.querySelectorAll("[data-pixel-icon]").forEach((canvas) => {
        const iconName = canvas.dataset.pixelIcon;
        renderArrayToCanvas(canvas, icons[iconName]);
      });
    }

    function isLessonPublished(lesson) {
      if (lesson.published) {
        return true;
      }
      if (!lesson.publishAt) {
        return false;
      }
      const publishTime = new Date(lesson.publishAt);
      return !Number.isNaN(publishTime.getTime()) && Date.now() >= publishTime.getTime();
    }

    function getLessonBuckets() {
      const published = [];
      const upcoming = [];

      lessons.forEach((lesson) => {
        if (isLessonPublished(lesson)) {
          published.push(lesson);
        } else {
          upcoming.push(lesson);
        }
      });

      return { published, upcoming };
    }

    function createCard(lesson) {
      const article = document.createElement("article");
      const isAvailable = isLessonPublished(lesson);
      const isCleared = clearedQuizNumbers.has(lesson.no);
      article.className = `card ${isAvailable ? "available" : "locked"}${isCleared ? " cleared" : ""}`;

      const statusClass = isAvailable ? "live" : "lock";
      const statusText = isAvailable ? "公開中" : "準備中";
      const action = isAvailable
        ? `<a class="button" href="${buildLessonUrl(lesson.href)}">第${lesson.no}回を開く</a>`
        : `<div class="button-muted">公開までお待ちください</div>`;
      const clearedBadge = isCleared
        ? '<span class="badge cleared">クリア済み</span>'
        : '';

      article.innerHTML = `
        <div class="badge-row">
          <span style="display:flex; gap:8px; flex-wrap:wrap;">
            <span class="badge ${statusClass}">${statusText}</span>
            ${clearedBadge}
          </span>
          <span class="lesson-phase">Lesson ${String(lesson.no).padStart(2, "0")}</span>
        </div>
        <div class="lesson-icon">
          <canvas data-pixel-icon="${lesson.icon}" aria-hidden="true"></canvas>
        </div>
        <div class="lesson-no">確認テスト ${lesson.no}</div>
        <div class="lesson-title">${lesson.title}</div>
        <div class="card-footer">${action}</div>
      `;

      return article;
    }

    function buildLessonUrl(path) {
      if (!liffId) {
        return path;
      }
      return `https://liff.line.me/${liffId}/${path}`;
    }

    function formatClearedQuizLabels(labels) {
      if (!Array.isArray(labels) || labels.length === 0) {
        return "まだありません";
      }
      return labels.join(" / ");
    }

    function buildProgressChart(history) {
      if (!Array.isArray(history) || history.length === 0) {
        return `
          <div class="welcome-chart-title">挑戦ごとの正答率</div>
          <div class="welcome-chart-empty">まだ履歴がありません。最初の挑戦から線が描かれます。</div>
        `;
      }

      const width = 640;
      const height = 220;
      const left = 42;
      const right = 20;
      const top = 14;
      const bottom = 34;
      const innerWidth = width - left - right;
      const innerHeight = height - top - bottom;
      const maxIndex = Math.max(history.length - 1, 1);

      const points = history.map((item, index) => {
        const x = left + (innerWidth * (index / maxIndex));
        const percentage = Number(item.percentage || 0);
        const y = top + innerHeight - (innerHeight * Math.max(0, Math.min(percentage, 100)) / 100);
        return { x, y, percentage, quizNo: item.quiz_no, sequence: item.sequence };
      });

      const polyline = points.map((point) => `${point.x},${point.y}`).join(" ");
      const pointMarkup = points.map((point) => `
        <circle cx="${point.x}" cy="${point.y}" r="4.5" fill="${point.percentage >= 80 ? '#16a34a' : '#2c7be5'}"></circle>
      `).join("");
      const labelMarkup = points.map((point) => `
        <text x="${point.x}" y="${height - 10}" text-anchor="middle" font-size="11" fill="#64748b">${point.sequence}</text>
      `).join("");
      const yGuides = [0, 50, 80, 100].map((value) => {
        const y = top + innerHeight - (innerHeight * value / 100);
        return `
          <line x1="${left}" y1="${y}" x2="${width - right}" y2="${y}" stroke="${value === 80 ? 'rgba(22,163,74,0.35)' : 'rgba(100,116,139,0.18)'}" stroke-dasharray="${value === 80 ? '6 4' : '4 5'}"></line>
          <text x="${left - 10}" y="${y + 4}" text-anchor="end" font-size="11" fill="#64748b">${value}%</text>
        `;
      }).join("");

      return `
        <div class="welcome-chart-title">挑戦ごとの正答率</div>
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="挑戦ごとの正答率の折れ線グラフ">
          ${yGuides}
          <polyline fill="none" stroke="#2c7be5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="${polyline}"></polyline>
          ${pointMarkup}
          ${labelMarkup}
          <text x="${width / 2}" y="${height - 2}" text-anchor="middle" font-size="11" fill="#64748b">挑戦回数</text>
        </svg>
      `;
    }

    function renderLessonCards() {
      const { published, upcoming } = getLessonBuckets();

      if (published.length === 0) {
        publishedGrid.innerHTML = '<div class="empty">現在公開中の確認テストはありません。</div>';
      } else {
        publishedGrid.innerHTML = "";
        published.forEach((lesson) => publishedGrid.appendChild(createCard(lesson)));
      }

      if (upcoming.length === 0) {
        upcomingGrid.innerHTML = '<div class="empty">準備中のテストはありません。</div>';
      } else {
        upcomingGrid.innerHTML = "";
        upcoming.forEach((lesson) => upcomingGrid.appendChild(createCard(lesson)));
      }
      renderVisibleIcons();
      liveCount.textContent = `${published.length}件公開中`;
    }

    let publishRefreshTimer = null;

    function scheduleNextPublishRefresh() {
      if (publishRefreshTimer) {
        clearTimeout(publishRefreshTimer);
      }

      const now = Date.now();
      const nextPublishTime = lessons
        .filter((lesson) => !isLessonPublished(lesson) && lesson.publishAt)
        .map((lesson) => new Date(lesson.publishAt).getTime())
        .filter((time) => !Number.isNaN(time) && time > now)
        .sort((a, b) => a - b)[0];

      if (!nextPublishTime) {
        return;
      }

      publishRefreshTimer = window.setTimeout(() => {
        renderLessonCards();
        scheduleNextPublishRefresh();
      }, Math.min(nextPublishTime - now + 1000, 2147483647));
    }

    async function loadWelcomeProgress() {
      if (!window.liff || !window.liff.getAccessToken || !apiBaseUrl) {
        return;
      }

      const accessToken = window.liff.getAccessToken();
      if (!accessToken) {
        return;
      }

      try {
        const response = await fetch(`${apiBaseUrl}/quiz_api/progress`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            line_access_token: accessToken,
            quiz_set: quizSet || "jintainokouzoutokinou"
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          return;
        }

        welcomeBadge.textContent = data.motivation_title || "Progress";
        welcomeBadge.style.display = "inline-flex";
        welcomeMessage.textContent = data.motivation_message || "";
        welcomeMessage.style.display = "block";
        welcomeClearedList.innerHTML = `<strong>クリア済み:</strong> ${formatClearedQuizLabels(data.cleared_quiz_labels)}`;
        welcomeClearedList.style.display = "block";
        welcomeStats.style.display = "grid";
        welcomeTotalAttempts.textContent = String(data.total_attempts ?? 0);
        welcomeCleared.textContent = `${data.cleared_quizzes ?? 0} / ${data.total_quizzes ?? 0}`;
        welcomePerfect.textContent = String(data.perfect_clears ?? 0);
        welcomeCompletion.textContent = `${data.completion_rate ?? 0}%`;
        welcomeChart.innerHTML = buildProgressChart(data.attempt_history);
        welcomeChart.style.display = "block";
        clearedQuizNumbers = new Set((data.cleared_quiz_numbers || []).map((value) => Number(value)));
        renderLessonCards();
      } catch (error) {
        console.error("Progress summary fetch failed:", error);
      }
    }

    async function initIndexLiff() {
      if (!liffId || !window.liff) {
        return;
      }

      try {
        await window.liff.init({
          liffId,
          withLoginOnExternalBrowser: true
        });

        const params = new URLSearchParams(window.location.search);
        const state = params.get("liff.state");
        if (state) {
          const targetUrl = new URL(decodeURIComponent(state), window.location.href);
          const currentUrl = new URL(window.location.href);
          const sameTarget =
            targetUrl.pathname === currentUrl.pathname &&
            targetUrl.search === currentUrl.search &&
            targetUrl.hash === currentUrl.hash;

          if (!sameTarget) {
            window.location.replace(targetUrl.toString());
            return;
          }
        }

        if (window.liff.isLoggedIn()) {
          const profile = await window.liff.getProfile();
          if (profile && profile.displayName) {
            welcomePanel.style.display = "block";
            welcomeName.textContent = `${profile.displayName}さん、ようこそ`;
            welcomeName.style.display = "block";
            await loadWelcomeProgress();
          }
        }
      } catch (error) {
        console.error("LIFF init failed on index page:", error);
      }
    }

    renderLessonCards();
    scheduleNextPublishRefresh();

    initIndexLiff();
  </script>
